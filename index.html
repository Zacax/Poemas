<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PoetStudio | Taller de Versos</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Iconos para que parezca App -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
</head>
<body>
    <!-- Botón flotante para móvil (Abrir Biblioteca) -->
    <button id="mobile-menu-btn" onclick="toggleSidebar()">📚</button>

    <div class="app-container">
        <aside class="sidebar-left" id="sidebar-left">
            <button id="btn-nuevo" onclick="nuevoPoema()">+ Nuevo Poema</button>
            <h3>Mi Biblioteca</h3>
            <div id="lista-poemas"></div>
            <div class="helper-text">
                <button onclick="descargarPoema()">💾 Exportar .txt</button>
            </div>
        </aside>

        <main class="main-editor">
            <div class="editor-wrapper">
                <input type="text" id="title" class="poem-title" placeholder="Título">
                <textarea id="editor" placeholder="Escribe aquí..."></textarea>
            </div>
        </main>

        <aside class="sidebar-right" id="metric-sidebar">
            <!-- Números de métrica -->
        </aside>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="scripts.js"></script>
</body>
</html>
